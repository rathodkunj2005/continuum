name: Continuum
options:
  deploymentTarget:
    iOS: '17.0'
settings:
  base:
    SWIFT_VERSION: 5.10
    CONTINUUM_BUNDLE_PREFIX: com.continuum.ios
    CONTINUUM_DEVELOPMENT_TEAM: ""
packages:
  ContinuumKit:
    path: ./ContinuumKit
targets:
  Continuum:
    type: application
    platform: iOS
    deploymentTarget: '17.0'
    sources:
      - path: Continuum
        excludes:
          - AppIntents/**
    dependencies:
      - package: ContinuumKit
        product: ContinuumKit
      - target: Continuum Watch
        embed: true
    settings:
      base:
        INFOPLIST_KEY_CFBundleDisplayName: Continuum
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleDefault
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: Continuum needs local network access to connect to your Mac companion runtime.
        INFOPLIST_KEY_NSCameraUsageDescription: Continuum uses the camera to scan the Mac pairing QR code.
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "$(CONTINUUM_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(CONTINUUM_BUNDLE_PREFIX)"
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: YES
  Continuum Watch:
    type: application
    platform: watchOS
    deploymentTarget: '10.0'
    sources:
      - path: "Continuum Watch"
    dependencies:
      - package: ContinuumKit
        product: ContinuumKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "$(CONTINUUM_BUNDLE_PREFIX).watchkitapp"
        INFOPLIST_KEY_CFBundleDisplayName: Continuum Watch
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: "$(CONTINUUM_BUNDLE_PREFIX)"
        INFOPLIST_KEY_WKApplication: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "$(CONTINUUM_DEVELOPMENT_TEAM)"
        GENERATE_INFOPLIST_FILE: YES
schemes:
  Continuum:
    build:
      targets:
        Continuum: all
    run:
      config: Debug
  Continuum Watch:
    build:
      targets:
        Continuum Watch: all
    run:
      config: Debug
